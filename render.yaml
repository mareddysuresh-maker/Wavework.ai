services:
  - type: web
    name: flowup-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowup-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowup-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: ALLOW_DEV_BYPASS
        value: "false"

  - type: redis
    name: flowup-redis
    plan: free
    ipAllowList: []

databases:
  - name: flowup-db
    databaseName: flowup_prod
    user: flowup_admin
    plan: free
